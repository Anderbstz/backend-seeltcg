server:
  port: 8080

spring:
  application:
    name: pikacards-api

  config:
    import: optional:file:.env[.properties]

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  datasource:
    url: jdbc:h2:mem:pikacards;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

pikacards:
  jwt:
    secret: pikacards-dev-secret-key-change-in-production-minimum-256-bits-long
    expiration-ms: 1800000

  stripe:
    public-key: ${STRIPE_PUBLIC_KEY:pk_test_placeholder}
    secret-key: ${STRIPE_SECRET_KEY:sk_test_placeholder}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

  deepseek:
    api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
    model: deepseek-chat

  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  h2:
    console:
      enabled: false

pikacards:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}

  google:
    client-id: ${GOOGLE_CLIENT_ID:}

---
spring:
  config:
    activate:
      on-profile: pg

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true

  h2:
    console:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: false

  h2:
    console:
      enabled: false

pikacards:
  frontend:
    url: ${FRONTEND_URL:http://localhost:3000}
